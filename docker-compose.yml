version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - photo_uploads:/app/uploads
      - photo_thumbnails:/app/thumbnails
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./photosync.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  photo_uploads:
  photo_thumbnails:

version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - photo_uploads:/app/uploads
      - photo_thumbnails:/app/thumbnails
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./photosync.db
      # The container binds to 0.0.0.0 (reachable from other devices), so an
      # API token is REQUIRED — without it anyone on the network can browse and
      # delete your photos. Set it in a .env file next to this compose file:
      #   API_TOKEN=$(python -c "import secrets; print(secrets.token_urlsafe(32))")
      - API_TOKEN=${API_TOKEN:?Set API_TOKEN in a .env file next to docker-compose.yml (see README)}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - '80:80'
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  photo_uploads:
  photo_thumbnails:
